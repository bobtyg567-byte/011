<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Modern Creative</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #0f172a; line-height: 1.5; }
        .container { max-width: 1280px; margin: 0 auto; padding: 2rem 1.5rem; }
        .profile-card { background: white; border-radius: 2rem; padding: 2rem; margin-bottom: 2.5rem; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.05); display: flex; flex-wrap: wrap; gap: 2rem; align-items: center; }
        .avatar img { width: 160px; height: 160px; object-fit: cover; border-radius: 50%; box-shadow: 0 15px 30px -10px rgba(0,0,0,0.15); border: 3px solid white; }
        .profile-info h1 { font-size: 2.2rem; font-weight: 700; margin-bottom: 0.5rem; background: linear-gradient(135deg, #0f172a, #2563eb); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .profile-info p { font-size: 1.1rem; color: #334155; }
        .section-title { font-size: 1.8rem; font-weight: 600; margin: 2rem 0 1.5rem 0; border-left: 5px solid #2563eb; padding-left: 1rem; }
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.8rem; }
        .project-card { background: white; border-radius: 1.5rem; padding: 1.5rem; transition: 0.2s; border: 1px solid #e2e8f0; }
        .project-card:hover { transform: translateY(-5px); box-shadow: 0 20px 30px -12px rgba(0,0,0,0.1); }
        .project-card h3 { font-size: 1.4rem; font-weight: 600; margin-bottom: 0.5rem; }
        .project-desc { color: #334155; margin: 0.75rem 0; }
        .project-link { background: #eff6ff; color: #2563eb; padding: 0.4rem 1rem; border-radius: 40px; text-decoration: none; font-weight: 500; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 6px; }
        .contact-block { background: white; border-radius: 1.5rem; padding: 1.5rem; display: flex; flex-wrap: wrap; gap: 1rem; border: 1px solid #e2e8f0; }
        .contact-item { display: flex; align-items: center; gap: 10px; background: #f1f5f9; padding: 0.6rem 1.2rem; border-radius: 60px; }
        .contact-item i { color: #2563eb; }
        .contact-item a { text-decoration: none; color: #0f172a; font-weight: 500; }
        .extra-section { background: white; border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid #e2e8f0; }
        .extra-section h3 { font-size: 1.3rem; font-weight: 600; margin-bottom: 0.75rem; }
        .empty-message, .loading { background: #f1f5f9; padding: 2rem; border-radius: 1.5rem; text-align: center; color: #475569; }
        footer { text-align: center; margin-top: 3rem; padding: 1.5rem; border-top: 1px solid #e2e8f0; color: #5b6e8c; }
        @media (max-width: 680px) { .profile-card { flex-direction: column; text-align: center; } }
    </style>
</head>
<body>
    <main class="container" id="portfolioRoot"><div class="loading"><i class="fas fa-spinner fa-pulse"></i> Loading portfolio...</div></main>
    <footer>© 2025 • Dynamic portfolio • Managed via SheetDB</footer>
    
    <script>
        const API_BASE = 'https://sheetdb.io/api/v1/aze92ll26mmmb';
        
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
        
        async function fetchSheet(sheetName) {
            try {
                const response = await fetch(`${API_BASE}?sheet=${sheetName}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (err) {
                console.error(`Error fetching ${sheetName}:`, err);
                return [];
            }
        }
        
        async function renderPortfolio() {
            const root = document.getElementById('portfolioRoot');
            try {
                const [profileData, projectsData, contactData, extrasData] = await Promise.all([
                    fetchSheet('profile'), fetchSheet('projects'), fetchSheet('contact'), fetchSheet('extra')
                ]);
                
                const profile = profileData?.[0] || { pictureurl: 'https://randomuser.me/api/portraits/women/68.jpg', name: 'Alex Morgan', description: 'Creative developer building impactful digital experiences.' };
                const contact = contactData?.[0] || { email: 'hello@alex.dev', phone: '+1 (555) 123-4567' };
                const projects = Array.isArray(projectsData) ? projectsData : [];
                const extras = Array.isArray(extrasData) ? extrasData : [];
                
                const profileHtml = `<div class="profile-card"><div class="avatar"><img src="${escapeHtml(profile.pictureurl)}" onerror="this.src='https://randomuser.me/api/portraits/lego/1.jpg'"></div><div class="profile-info"><h1>${escapeHtml(profile.name)}</h1><p>${escapeHtml(profile.description)}</p></div></div>`;
                
                let projectsHtml = `<div class="section-title"><i class="fas fa-code-branch"></i> Featured projects</div>`;
                if (!projects.length) projectsHtml += `<div class="empty-message">✨ No projects yet. Check back soon!</div>`;
                else {
                    projectsHtml += `<div class="projects-grid">`;
                    projects.forEach(p => {
                        projectsHtml += `<div class="project-card"><h3>${escapeHtml(p.name)}</h3><div class="project-desc">${escapeHtml(p.description)}</div><a href="${escapeHtml(p.livelink || '#')}" target="_blank" rel="noopener" class="project-link"><i class="fas fa-external-link-alt"></i> Live preview</a></div>`;
                    });
                    projectsHtml += `</div>`;
                }
                
                const contactHtml = `<div class="section-title"><i class="fas fa-address-card"></i> Contact</div><div class="contact-block"><div class="contact-item"><i class="fas fa-envelope"></i> <a href="mailto:${escapeHtml(contact.email)}">${escapeHtml(contact.email)}</a></div><div class="contact-item"><i class="fas fa-phone-alt"></i> <a href="tel:${escapeHtml(contact.phone)}">${escapeHtml(contact.phone)}</a></div></div>`;
                
                let extrasHtml = `<div class="section-title"><i class="fas fa-plus-circle"></i> More about me</div>`;
                if (!extras.length) extrasHtml += `<div class="empty-message">➕ Additional content coming soon.</div>`;
                else extras.forEach(s => { extrasHtml += `<div class="extra-section"><h3>${escapeHtml(s.title)}</h3><div>${s.content || ''}</div></div>`; });
                
                root.innerHTML = profileHtml + projectsHtml + contactHtml + extrasHtml;
            } catch (err) {
                console.error(err);
                root.innerHTML = `<div class="empty-message"><i class="fas fa-exclamation-triangle"></i> Unable to load portfolio. Please try again later.</div>`;
            }
        }
        
        renderPortfolio();
        setInterval(renderPortfolio, 30000);
    </script>
</body>
</html>
